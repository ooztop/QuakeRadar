<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuakeRadar | Kriz Yönetim Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff3e3e;
            --secondary: #2d3436;
            --accent: #00cec9;
            --bg: #0b0b0e;
            --card-bg: rgba(255, 255, 255, 0.04);
            --text: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; overflow: hidden; }

        /* Giriş Ekranı */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            transition: opacity 0.5s ease;
        }
        .login-card {
            background: var(--card-bg); padding: 3rem; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 400px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .login-card h2 { margin-bottom: 2rem; font-size: 1.8rem; letter-spacing: 1px; }
        .login-card input {
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3);
            color: white; font-size: 1rem; outline: none; transition: 0.3s;
        }
        .login-card input:focus { border-color: var(--primary); }
        .login-card button {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--primary); color: white; font-weight: bold;
            cursor: pointer; font-size: 1rem; transition: 0.3s;
        }
        .login-card button:hover { transform: translateY(-2px); filter: brightness(1.2); }

        /* Dashboard Düzeni */
        .container { display: flex; height: 100vh; opacity: 0; transition: opacity 0.5s ease; }
        .sidebar { width: 320px; border-right: 1px solid rgba(255,255,255,0.05); padding: 2rem; display: flex; flex-direction: column; }
        .main-content { flex: 1; display: grid; grid-template-rows: auto 1fr; padding: 2rem; gap: 2rem; }
        .detail-panel { width: 350px; border-left: 1px solid rgba(255,255,255,0.05); padding: 2rem; background: rgba(255,255,255,0.01); }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .logo { font-weight: 700; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--primary); }

        /* Kullanıcı Listesi */
        .user-list { margin-top: 2rem; overflow-y: auto; flex: 1; }
        .user-item {
            padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.02);
            margin-bottom: 10px; cursor: pointer; transition: 0.3s;
            border: 1px solid transparent; display: flex; align-items: center; gap: 12px;
        }
        .user-item:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
        .user-item.active { background: rgba(255,62,62,0.1); border-color: var(--primary); }
        .user-avatar { width: 35px; height: 35px; border-radius: 10px; background: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .user-info-brief h4 { font-size: 0.95rem; }
        .user-info-brief p { font-size: 0.75rem; color: var(--text-dim); }

        /* Terminal & Detay */
        .card { background: var(--card-bg); border-radius: 24px; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.05); }
        .terminal { background: #000; border-radius: 16px; padding: 1rem; height: 100%; overflow-y: auto; font-family: monospace; font-size: 0.85rem; color: #00ff7f; }
        
        .detail-card h3 { margin-bottom: 1.5rem; color: var(--primary); }
        .detail-row { margin-bottom: 1.5rem; }
        .detail-row label { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; }
        .detail-row p { font-size: 1rem; font-weight: 500; }

        .btn-group { display: flex; gap: 10px; margin-top: 1rem; }
        .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; font-size: 0.85rem; transition: 0.2s; color: white; }
        .btn-red { background: var(--primary); }
        .btn-map { background: #4285F4; }

        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .safe { background: rgba(0, 255, 127, 0.2); color: #00ff7f; }
        .danger { background: rgba(255, 62, 62, 0.2); color: #ff3e3e; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2>🛡️ QuakeRadar Giriş</h2>
            <input type="text" id="username" placeholder="Kullanıcı Adı">
            <input type="password" id="password" placeholder="Şifre">
            <button onclick="login()">Sisteme Gir</button>
            <p id="login-error" style="color:var(--primary); margin-top: 15px; font-size: 0.8rem; display: none;">Hatalı bilgiler!</p>
        </div>
    </div>

    <div class="container" id="main-container">
        <div class="sidebar">
            <div class="logo">🛡️ Quake<span>Radar</span></div>
            <div class="user-list" id="user-list">
                <p class="log-system" style="font-size: 0.8rem;">Cihazlar bekleniyor...</p>
            </div>
            <div style="margin-top: 2rem;">
                <button class="btn btn-red" style="width: 100%;" onclick="sendCommand('deprem')">🚨 DEPREM UYARISI</button>
                <div class="btn-group">
                    <button class="btn" style="background:#333;" onclick="sendCommand('konum')">📍 Konum İste</button>
                    <button class="btn" style="background:#333;" onclick="sendCommand('reset')">🔄 Reset</button>
                </div>
            </div>
        </div>

        <div class="main-content">
            <header>
                <h3 id="panel-title">Sistem Konsolu</h3>
                <div id="conn-status" style="font-size: 0.8rem; color: #00ff7f; display: flex; align-items: center; gap: 15px;">
                <span id="radar-status" class="status-pill danger" style="background: rgba(255, 62, 62, 0.1);">📡 Radar: KAPALI</span>
                ● Sunucu Bağlı
            </div>
            </header>
            <div class="card" style="overflow: hidden;">
                <div class="terminal" id="terminal">
                    <div style="color: #aaa;">> QuakeRadar v1.0 Kriz Masası Hazır.</div>
                </div>
            </div>
        </div>

        <div class="detail-panel">
            <div id="detail-view" style="display: none;">
                <h3 id="det-name">Kullanıcı Detayı</h3>
                <span id="det-status" class="status-pill safe">Güvende</span>
                
                <div class="detail-row" style="margin-top: 2rem;">
                    <label>Kan Grubu</label>
                    <p id="det-blood">-</p>
                </div>
                <div class="detail-row">
                    <label>Acil Durum Kişileri</label>
                    <p id="det-e1">-</p>
                    <p id="det-e2">-</p>
                </div>
                <div class="detail-row">
                    <label>Ev Adresi / Not</label>
                    <p id="det-home">-</p>
                </div>
                <div class="detail-row">
                    <label>Son Konum</label>
                    <p id="det-coords">Bilinmiyor</p>
                </div>
                
                <button class="btn btn-map" id="map-btn" style="width: 100%; margin-top: 1rem;">🗺️ Haritada Göster</button>
            </div>
            <div id="no-selection" style="height: 100%; display: flex; align-items: center; justify-content: center; text-align: center; color: var(--text-dim);">
                <p>Detayları görmek için<br>bir cihaz seçin.</p>
            </div>
        </div>
    </div>

    <script>
        let ws;
        let connectedUsers = [];
        let selectedUserId = null;

        function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (u === 'deprem' && p === 'deprem123') {
                document.getElementById('login-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-container').style.opacity = '1';
                    connect();
                }, 500);
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);

            ws.onopen = () => {
                ws.send(JSON.stringify({ type: 'ADMIN_AUTH', payload: { secret: 'QUAKE_SECRET_2024' } }));
            };

            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'LOG') addLog(msg.payload.text, msg.payload.level);
                if (msg.type === 'UPDATE_USERS') {
                    connectedUsers = msg.payload;
                    renderUserList();
                    
                    // Seçili kullanıcının verilerini anlık güncelle
                    if (selectedUserId) {
                        const updatedUser = connectedUsers.find(u => u.id === selectedUserId);
                        if (updatedUser) {
                            selectUser(updatedUser, false);
                        }
                    }
                }

                if (msg.type === 'RADAR_STATUS') {
                    updateRadarUI(msg.payload);
                }
            };
        }

        function updateRadarUI(isActive) {
            const el = document.getElementById('radar-status');
            if (isActive) {
                el.innerText = '📡 Radar: AKTİF';
                el.className = 'status-pill safe';
                el.style.background = 'rgba(0, 255, 127, 0.1)';
            } else {
                el.innerText = '📡 Radar: KAPALI';
                el.className = 'status-pill danger';
                el.style.background = 'rgba(255, 62, 62, 0.1)';
            }
        }

        function renderUserList() {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            connectedUsers.forEach(user => {
                const div = document.createElement('div');
                div.className = `user-item ${selectedUserId === user.id ? 'active' : ''}`;
                div.onclick = () => selectUser(user);
                
                const statusClass = user.status === 'TRAPPED' ? 'danger' : 'safe';
                
                div.innerHTML = `
                    <div class="user-avatar">${user.name[0]}</div>
                    <div class="user-info-brief">
                        <h4>${user.name}</h4>
                        <p>${user.bloodType} | <span class="status-pill ${statusClass}">${user.status || 'Aktif'}</span></p>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function selectUser(user, shouldRenderList = true) {
            selectedUserId = user.id;
            if (shouldRenderList) renderUserList();
            
            document.getElementById('no-selection').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            
            document.getElementById('det-name').innerText = user.name;
            document.getElementById('det-blood').innerText = user.bloodType;
            document.getElementById('det-e1').innerText = "1: " + (user.emergency1 || '-');
            document.getElementById('det-e2').innerText = "2: " + (user.emergency2 || '-');
            document.getElementById('det-home').innerText = user.homeLocation || '-';
            
            const statusEl = document.getElementById('det-status');
            if (user.status === 'TRAPPED') {
                statusEl.innerText = 'SOS: ENKAZDA';
                statusEl.className = 'status-pill danger';
            } else {
                statusEl.innerText = 'GÜVENDE';
                statusEl.className = 'status-pill safe';
            }

            if (user.coords) {
                document.getElementById('det-coords').innerText = `${user.coords.latitude}, ${user.coords.longitude}`;
                document.getElementById('map-btn').onclick = () => {
                    window.open(`https://www.google.com/maps?q=${user.coords.latitude},${user.coords.longitude}`, '_blank');
                };
                document.getElementById('map-btn').style.display = 'block';
            } else {
                document.getElementById('det-coords').innerText = "Konum alınmadı";
                document.getElementById('map-btn').style.display = 'none';
            }
        }

        function addLog(text, level) {
            const div = document.createElement('div');
            div.style.color = level === 'alert' ? '#ff3e3e' : (level === 'success' ? '#00ff7f' : '#00cec9');
            div.innerHTML = `> ${text}`;
            const terminal = document.getElementById('terminal');
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function sendCommand(cmd) {
            ws.send(JSON.stringify({ type: 'ADMIN_COMMAND', payload: cmd }));
        }
    </script>
</body>
</html>
